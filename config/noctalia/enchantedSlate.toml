[bar]
order = [ "top" ]

    [bar.top]
    background_opacity = 0.82999998144805431
    center = [ "audio_visualizer", "clock", "audio_visualizer" ]
    end = [ "tray", "battery", "notifications" ]
    margin_ends = 10
    position = "left"
    radius = 80
    start = [ "date", "wallpaper", "workspaces" ]

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "audio"

[[control_center.shortcuts]]
type = "mic_mute"

[[control_center.shortcuts]]
type = "weather"

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

[location]
auto_locate = true

[lockscreen]
fingerprint = false

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-widget-0000000000000002", "lockscreen-widget-0000000000000003" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1477.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 0.0
    box_width = 0.0
    cx = 800.0
    cy = 500.0
    output = "eDP-1"
    rotation = 0.0
    type = "fancy_audio_visualizer"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        background = false

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000003]
    box_height = 192.0
    box_width = 192.0
    cx = 800.0
    cy = 180.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000003.settings]
        background = false
        clock_style = "analog"
        format = "{:%r}"

[nightlight]
enabled = true

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
launch_apps_as_systemd_services = true
polkit_agent = true
screen_time_enabled = true

    [shell.panel]
    launcher_compact = true
    launcher_session_search = true
    session_placement = "centered"
    transparency_mode = "glass"

    [shell.screen_corners]
    enabled = true

    [shell.screenshot]
    directory = "~/Pictures/Screenshots"

[theme]
community_palette = "Oxocarbon"
custom_palette = "swirldownlogo1600-vib"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "vibrant"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "foot", "gtk3", "gtk4", "hyprland", "kitty" ]
    community_ids = [ "zen-browser", "neovim", "discord", "steam", "yazi", "snappy-switcher", "hyprtoolkit" ]

[wallpaper]
directory = "~/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/andiurne/Pictures/Wallpapers/originals/swirlDownLogo1600.png"

    [wallpaper.last]
    path = "/home/andiurne/Pictures/Wallpapers/originals/swirlDownLogo1600.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/andiurne/Pictures/Wallpapers/originals/swirlDownLogo1600.png"

[weather]
unit = "imperial"

[widget.audio_visualizer]
color_2 = "secondary"
show_when_idle = true
width = 188.0

[widget.brightness]
scroll_step = 2

[widget.clock]
format = "%I:%M:%p"

[widget.output_volume]
scroll_step = 2

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.spacer_2]
type = "spacer"
